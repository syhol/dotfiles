[tools]
node = "latest"
deno = "latest"
bun = "latest"
uv = "latest"
go = "latest"
usage = "latest"
claude = "latest"
codex = "latest"
biome = "latest"
dprint = "latest"
"github:Dashlane/dashlane-cli" = "latest"
"github:fioncat/otree" = "latest"
"github:schpet/linear-cli" = "1.10.0"
"npm:agent-browser" = "latest"
"npm:@mariozechner/pi-coding-agent" = "latest"
"http:acme.sh" = { version = "1.0.0", url = "https://raw.githubusercontent.com/acmesh-official/acme.sh/master/acme.sh" }


[tasks.docker]
run = "docker run --pull=always -it --rm --entrypoint bash jdxcode/mise:latest"
[tasks.refresh]
dir = "{{cwd}}"
run = '''
mise run stop
mise run reset
docker builder prune --filter "until=168h" -f
docker volume prune -f
mise run start
'''

[settings]
experimental = true
color_theme = "catppuccin"
idiomatic_version_file_enable_tools = []

[settings.pipx]
uvx = true

[settings.npm]
bun = true

